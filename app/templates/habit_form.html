{% extends "base.html" %}
{% block title %}{{ heading }} — wger-hero{% endblock %}
{% block content %}

<div class="page-header">
  <h1>{{ heading }}</h1>
</div>

<section class="card">
  <form method="POST" action="{{ form_action }}" class="form">
    <div class="form-row">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" required
             value="{{ habit.title if habit else '' }}" placeholder="e.g. Read for 30 minutes">
    </div>

    <div class="form-row">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="2"
                placeholder="Optional notes">{{ habit.description if habit and habit.description else '' }}</textarea>
    </div>

    <div class="form-grid">
      <div class="form-row">
        <label for="category">Category</label>
        <select id="category" name="category" onchange="updatePreview()">
          <option value="">— select —</option>
          {% for key, label in categories.items() %}
          <option value="{{ key }}" {% if habit and habit.category == key %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-row">
        <label for="duration_size">Duration</label>
        <select id="duration_size" name="duration_size" onchange="updatePreview()">
          <option value="">— select —</option>
          {% for key, label in duration_labels.items() %}
          <option value="{{ key }}" {% if habit and habit.duration_size == key %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-row">
        <label for="effort">Effort</label>
        <select id="effort" name="effort" onchange="updatePreview()">
          <option value="">— select —</option>
          {% for key, label in effort_labels.items() %}
          <option value="{{ key }}" {% if habit and habit.effort == key %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-row">
        <label for="recurrence">Recurrence</label>
        <select id="recurrence" name="recurrence">
          {% for r in recurrences %}
          <option value="{{ r }}" {% if habit and habit.recurrence == r %}selected{% elif not habit and r == 'daily' %}selected{% endif %}>{{ r }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-row">
        <label for="target_count">Target count (per period)</label>
        <input type="number" id="target_count" name="target_count" min="1"
               value="{{ habit.target_count if habit else 1 }}">
      </div>
    </div>

    <div id="reward-preview" class="card" style="background:#f8f8f2;margin:1rem 0;display:none;">
      <div class="card-title">Reward Preview</div>
      <div id="preview-content"></div>
    </div>

    <div class="form-row checkbox-row">
      <label class="checkbox">
        <input type="checkbox" name="active" {% if not habit or habit.active %}checked{% endif %}>
        Active
      </label>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="/habits" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</section>

<script>
const DURATION_XP = {"mini": 15, "short": 25, "normal": 40, "long": 60, "large": 80};
const EFFORT_MULT = {"easy": 0.8, "normal": 1.0, "demanding": 1.25};
const CATEGORY_STATS = {
  "strength_training": {"strength": 45, "body_control": 25, "discipline": 20, "technique": 10},
  "endurance": {"endurance": 60, "discipline": 25, "recovery": 15},
  "mobility": {"mobility": 65, "recovery": 25, "discipline": 10},
  "technique_skill": {"technique": 45, "body_control": 30, "discipline": 15, "dexterity": 10},
  "knowledge_learning": {"knowledge": 70, "discipline": 20, "technique": 10},
  "creativity": {"creativity": 65, "technique": 20, "discipline": 15},
  "household_order": {"discipline": 60, "recovery": 25, "dexterity": 15},
  "project_work": {"knowledge": 40, "technique": 35, "discipline": 25},
  "recovery": {"recovery": 70, "mobility": 20, "discipline": 10},
  "social_community": {"creativity": 35, "recovery": 35, "discipline": 20, "knowledge": 10}
};
const STAT_NAMES = {{ stat_names | tojson }};

function calcXp(duration, effort) {
  const base = DURATION_XP[duration] || 40;
  const mult = EFFORT_MULT[effort] || 1.0;
  const raw = base * mult;
  return Math.round(raw / 5) * 5;
}

function updatePreview() {
  const cat = document.getElementById('category').value;
  const dur = document.getElementById('duration_size').value;
  const eff = document.getElementById('effort').value;
  const preview = document.getElementById('reward-preview');
  const content = document.getElementById('preview-content');

  if (!cat || !dur || !eff) {
    preview.style.display = 'none';
    return;
  }

  const xp = calcXp(dur, eff);
  const dist = CATEGORY_STATS[cat] || {};
  let html = `<p><strong>Global XP: +${xp}</strong></p><ul>`;
  for (const [stat, pct] of Object.entries(dist)) {
    const val = Math.round(xp * pct / 100);
    const name = STAT_NAMES[stat] || stat;
    html += `<li>${name}: +${val} (${pct}%)</li>`;
  }
  html += '</ul>';
  content.innerHTML = html;
  preview.style.display = 'block';
}

// Run on page load if editing an existing habit
updatePreview();
</script>

{% endblock %}
