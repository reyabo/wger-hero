<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}wger-hero{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">⚔ wger-hero</a>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/quests">Quests</a>
        <a href="/achievements">Achievements</a>
        <a href="/settings">Settings</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>wger-hero &mdash; self-hosted training companion</span>
    </div>
  </footer>
</body>
</html>
