<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}wger-hero{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">⚔ wger-hero</a>
      <nav>
        <a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>Übersicht</a>
        <a href="/habits" {% if request.url.path.startswith('/habits') %}class="active"{% endif %}>Habits</a>
        <a href="/quests" {% if request.url.path.startswith('/quests') %}class="active"{% endif %}>Quests</a>
        <a href="/achievements" {% if request.url.path.startswith('/achievements') %}class="active"{% endif %}>Achievements</a>
        <a href="/stats" {% if request.url.path.startswith('/stats') %}class="active"{% endif %}>Attribute</a>
        <a href="/settings" {% if request.url.path.startswith('/settings') %}class="active"{% endif %}>Einstellungen</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>wger-hero &mdash; selbst gehosteter Trainingsbegleiter</span>
    </div>
  </footer>
</body>
</html>
